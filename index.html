<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>머지 레스토랑 - Merge Cooking Game</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="머지 레스토랑">
        <header class="topbar">
          <div class="logo-area">
            <p class="eyebrow">🍳 Merge Cooking</p>
            <h1>머지 레스토랑</h1>
          </div>
          <div class="scoreboard">
            <div class="score-item gold-display">
              <span>💰 골드</span>
              <strong id="gold">100</strong>
            </div>
            <div class="score-item">
              <span>점수</span>
              <strong id="score">0</strong>
            </div>
            <div class="score-item">
              <span>최고</span>
              <strong id="best">0</strong>
            </div>
            <div class="score-item">
              <span>레벨</span>
              <strong id="level">1</strong>
            </div>
          </div>
        </header>

        <div class="game-layout">
          <!-- 왼쪽: 손님 주문 -->
          <aside class="order-panel">
            <h3 class="panel-title">👤 손님 주문</h3>
            <div id="orders" class="orders-container"></div>
            <div class="order-timer">
              <span>다음 손님까지</span>
              <div class="timer-bar">
                <div id="timerFill" class="timer-fill"></div>
              </div>
            </div>
          </aside>

          <!-- 중앙: 게임 보드 -->
          <div class="board-section">
            <div class="board-wrap">
              <div id="grid" class="grid"></div>
              <div id="overlay" class="overlay hidden">
                <h2>🍽️ 영업 종료!</h2>
                <p id="gameOverMsg">주방이 가득 찼어요!</p>
                <div class="final-score">
                  <span>최종 점수</span>
                  <strong id="finalScore">0</strong>
                </div>
                <button id="restartOverlay" type="button">🔄 다시 시작</button>
              </div>
            </div>

            <!-- 하단: 생성기 & 조리대 -->
            <div class="bottom-panel">
              <div class="generators">
                <h3 class="panel-title">🏪 상점</h3>
                <div id="generators" class="generators-container"></div>
              </div>
              <div class="cooking-station">
                <h3 class="panel-title">🍳 조리대</h3>
                <div id="cookingStation" class="cooking-station-area">
                  <div class="cooking-slots">
                    <div class="cooking-slot" data-slot="0"></div>
                    <div class="cooking-slot" data-slot="1"></div>
                    <div class="cooking-slot" data-slot="2"></div>
                  </div>
                  <button id="cookBtn" class="cook-btn">🔥 요리하기!</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 오른쪽: 레시피 & 정보 -->
          <aside class="info-panel">
            <h3 class="panel-title">📖 레시피</h3>
            <div id="recipeList" class="recipe-list"></div>
            <div class="tip-box">
              <p>💡 재료를 클릭해서 조리대에 놓으세요!</p>
              <p>🔥 조합이 맞으면 요리가 완성됩니다!</p>
            </div>
          </aside>
        </div>

        <footer class="controls">
          <button id="restart" type="button">🔄 새 게임</button>
          <div class="tip">
            <span>💡 상점에서 재료 구매 → 그리드에 배치 → 조리대에서 요리 → 손님에게 제공!</span>
          </div>
        </footer>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
