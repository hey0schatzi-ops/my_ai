<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>머지 레스토랑 - Merge Cooking Game</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="머지 레스토랑">
        <header class="topbar">
          <div class="logo-area">
            <p class="eyebrow">🍳 Merge Cooking</p>
            <h1>머지 레스토랑</h1>
          </div>
          <div class="scoreboard">
            <div class="score-item">
              <span>점수</span>
              <strong id="score">0</strong>
            </div>
            <div class="score-item">
              <span>최고</span>
              <strong id="best">0</strong>
            </div>
            <div class="score-item">
              <span>레벨</span>
              <strong id="level">1</strong>
            </div>
          </div>
        </header>

        <div class="game-layout">
          <!-- 주문 패널 -->
          <aside class="order-panel">
            <h3 class="panel-title">📋 주문서</h3>
            <div id="orders" class="orders-container"></div>
            <div class="order-timer">
              <span>다음 주문까지</span>
              <div class="timer-bar">
                <div id="timerFill" class="timer-fill"></div>
              </div>
            </div>
          </aside>

          <!-- 게임 보드 -->
          <div class="board-wrap">
            <div id="grid" class="grid"></div>
            <div id="overlay" class="overlay hidden">
              <h2>🍽️ 영업 종료!</h2>
              <p id="gameOverMsg">주방이 가득 찼어요!</p>
              <div class="final-score">
                <span>최종 점수</span>
                <strong id="finalScore">0</strong>
              </div>
              <button id="restartOverlay" type="button">🔄 다시 시작</button>
            </div>
          </div>

          <!-- 다음 재료 & 정보 -->
          <aside class="info-panel">
            <h3 class="panel-title">🧺 다음 재료</h3>
            <div id="nextIngredient" class="next-ingredient"></div>
            <div class="recipe-book">
              <h3 class="panel-title">📖 레시피</h3>
              <div id="recipeList" class="recipe-list"></div>
            </div>
          </aside>
        </div>

        <footer class="controls">
          <button id="restart" type="button">🔄 새 게임</button>
          <div class="tip">
            <span>💡 재료를 드래그해서 이동! 같은 재료끼리 합쳐서 요리를 완성하세요!</span>
          </div>
        </footer>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
